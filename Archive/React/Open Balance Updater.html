<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=http://localhost:5173">
    <title>Opening Balance Updater...</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 60px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-size: 24px;
            color: #E8E8E8;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #222;
            border-top-color: #23D389;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .warning {
            background: #111;
            border: 1px solid #D04E59;
            border-radius: 6px;
            padding: 20px;
            margin-top: 30px;
            color: #D04E59;
        }

        .warning h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .manual-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #2870F0;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
            font-size: 13px;
        }

        .manual-link:hover {
            background: #1e5fd4;
        }

        code {
            background: #000;
            border: 1px solid #222;
            color: #E8E8E8;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Opening Balance Updater...</h1>
        <div class="spinner"></div>
        <p>Redirecting to <code>http://localhost:5173</code></p>
        <p style="font-size: 14px; margin-top: 20px;">If the page doesn't open automatically:</p>
        <a href="http://localhost:5173" class="manual-link">Click Here to Open</a>

        <div class="warning">
            <h3>⚠️ Server Must Be Running</h3>
            <p style="margin-bottom: 10px;">Make sure you've started the server first by double-clicking:</p>
            <code style="display: block; margin-top: 10px;">start_react_app.command</code>
        </div>
    </div>

    <script>
        // Automatically redirect after a brief delay
        setTimeout(function() {
            window.location.href = 'http://localhost:5173';
        }, 1000);
    </script>
</body>
</html>
